<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Left arm of V: two parallel lines -->
  <line x1="6" y1="4" x2="15.5" y2="27" stroke="#F2EFE9" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <line x1="8.5" y1="4" x2="16" y2="27" stroke="#F2EFE9" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <!-- Right arm of V: two parallel lines -->
  <line x1="23.5" y1="4" x2="16.5" y2="27" stroke="#F2EFE9" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <line x1="26" y1="4" x2="17" y2="27" stroke="#F2EFE9" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <!-- Dot at the convergence point -->
  <circle cx="16" cy="28.5" r="1.2" fill="#7C3AED"/>
</svg>
