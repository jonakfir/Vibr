<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Black background -->
  <rect width="1200" height="630" fill="#000000"/>
  <!-- Centered logo group -->
  <g transform="translate(480, 255)">
    <!-- V Mark -->
    <!-- Left arm: two parallel lines -->
    <line x1="10" y1="10" x2="33" y2="90" stroke="#F2EFE9" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <line x1="15" y1="10" x2="35.5" y2="90" stroke="#F2EFE9" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <!-- Right arm: two parallel lines -->
    <line x1="55" y1="10" x2="37" y2="90" stroke="#F2EFE9" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <line x1="60" y1="10" x2="39.5" y2="90" stroke="#F2EFE9" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <!-- Dot at convergence -->
    <circle cx="36.5" cy="95" r="2.5" fill="#7C3AED"/>
    <!-- Wordmark -->
    <text x="82" y="82" font-family="'Cormorant Garamond', 'Cormorant', Georgia, 'Times New Roman', serif" font-size="64" font-weight="300" fill="#F2EFE9" letter-spacing="2">Vibr</text>
  </g>
</svg>
