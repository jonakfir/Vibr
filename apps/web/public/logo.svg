<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 40" width="160" height="40">
  <!-- V Mark -->
  <!-- Left arm: two parallel lines -->
  <line x1="4" y1="5" x2="16.5" y2="34" stroke="#F2EFE9" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <line x1="6.8" y1="5" x2="17.2" y2="34" stroke="#F2EFE9" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <!-- Right arm: two parallel lines -->
  <line x1="28" y1="5" x2="17.8" y2="34" stroke="#F2EFE9" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <line x1="30.8" y1="5" x2="18.5" y2="34" stroke="#F2EFE9" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <!-- Dot at convergence -->
  <circle cx="17.5" cy="36" r="1.3" fill="#7C3AED"/>
  <!-- Wordmark -->
  <text x="44" y="32" font-family="'Cormorant Garamond', 'Cormorant', Georgia, 'Times New Roman', serif" font-size="28" font-weight="300" fill="#F2EFE9" letter-spacing="1">Vibr</text>
</svg>
